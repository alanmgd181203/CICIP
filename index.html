<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Proyecto CICIP | Recorrido Virtual">
  <meta property="og:description" content="Exploración interactiva del proyecto arquitectónico. Navega por las plantas, exteriores y vistas 3D.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/imagen-portada.webp">
  <meta name="description" content="Recorrido virtual interactivo del proyecto arquitectónico CICIP.">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CICIP">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/imagen-portada.webp">
  <title>Exploración de Proyecto CICIP</title>
  <link rel="preload" as="image" href="assets/Planta Conjunto.webp" type="image/webp">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    /* ── Overlay de oscurecimiento ── */
    #overlay-oscuro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loader-escena {
      display: none;
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: girar 0.9s linear infinite;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 32px 0;
      color: #f0f0f0;
    }

    #contenedor-encabezado {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      position: relative;
      z-index: 250;
      pointer-events: none;
    }

    #contenedor-encabezado h1 {
      margin: 32px 0;
    }

    #contenedor-encabezado h1,
    #btn-regresar-planta {
      pointer-events: auto;
    }

    #btn-regresar-planta {
      display: none;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: 2px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      position: relative;
      z-index: 251;
    }

    #btn-regresar-planta:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    .map-container {
      position: relative;
      width: 100%;
      overflow: visible;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .mapa-interactivo {
      position: relative;
      width: 100%;
      max-width: 100%;
      flex-shrink: 0;
    }

    .mapa-interactivo > #mapa-principal,
    .mapa-interactivo > #mapa-secundario {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
    }

    .mapa-interactivo > #mapa-principal {
      cursor: crosshair;
    }

    .mapa-interactivo > #mapa-secundario {
      display: none;
    }

    .mapa-interactivo > .nav-escena-4,
    .mapa-interactivo > [class*="botones-"],
    .mapa-interactivo > [class*="camara-"],
    .mapa-interactivo > [id^="camara-"],
    .mapa-interactivo > [id^="nav-"] {
      position: absolute;
    }

    body.sin-herramienta-coords .mapa-interactivo > #mapa-principal {
      cursor: default;
    }

    body.sin-herramienta-coords .herramienta-coordenadas-exterior {
      cursor: default;
    }

    #btn-editor.bloqueado-dev {
      opacity: 0.45;
      cursor: not-allowed;
      color: #666 !important;
      border-color: #444 !important;
    }

    /* ── Animaciones cinemáticas ── */
    @keyframes zoom-salir {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(4); }
    }

    @keyframes zoom-entrar {
      from { opacity: 0; transform: scale(2); }
      to   { opacity: 1; transform: scale(1); }
    }

    .animacion-salir  { animation: zoom-salir  2.4s ease-in  forwards; }
    .animacion-entrar { animation: zoom-entrar 2.4s ease-out forwards; }

    /* ── Etiquetas de navegación estilo señalética ── */
    .etiqueta-navegacion {
      position: absolute;
      transform: translate(-50%, -50%);
      background-color: rgba(20, 20, 20, 0.78);
      color: #e8e8e8;
      padding: 7px 16px 7px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .etiqueta-navegacion::before {
      content: '›';
      font-size: 16px;
      font-weight: bold;
      color: #aaa;
      line-height: 1;
    }

    /* ── Animaciones específicas para Escena 3 ── */
    @keyframes zoom-entrar-escena3 {
      from { opacity: 0; transform: scale(1.3); }
      to   { opacity: 1; transform: scale(1);   }
    }

    /* Regreso desde Escena 3: menos escala, misma duración */
    @keyframes zoom-entrar-regreso-e3 {
      from { opacity: 0; transform: scale(1.12); }
      to   { opacity: 1; transform: scale(1);    }
    }

    .animacion-salir-e3        { animation: zoom-salir            3.0s ease-in  forwards; }
    .animacion-entrar-e3       { animation: zoom-entrar-escena3   2.2s ease-out forwards; }
    .animacion-entrar-regreso-e3 { animation: zoom-entrar-regreso-e3 2.4s ease-out forwards; }

    /* ── Botón catch-all — cubre toda la imagen ── */
    .btn-catchall-escena-1 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      cursor: pointer;
    }

    /* ── Panel HUD de información ── */
    #panel-info {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 18px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
    }

    /* ── Botón círculo principal ── */
    .area-edificio-circular-1 {
      position: absolute;
      top: 11.16%;
      left: 43.86%;
      width: 41.92%;
      height: 74.52%;
      border-radius: 50%;
      z-index: 20;
      cursor: pointer;
    }

    /* Zonas interactivas con iluminación premium sin alterar geometría */
    .zona-interactiva {
      background-color: transparent !important;
      border: none !important;
      transition: background-color 0.2s ease, backdrop-filter 0.2s ease !important;
      cursor: pointer;
    }
    .zona-interactiva:hover {
      background-color: rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: brightness(1.15) contrast(1.05) !important;
    }

    /* Botones grises de navegación con contorno (Drop Shadow) */
    .nav-escena-4 {
      background-color: rgba(128, 128, 128, 0.4) !important;
      filter: drop-shadow(0px 0px 2px rgba(255, 255, 255, 0.4)) !important;
      transition: background-color 0.2s ease, filter 0.2s ease, backdrop-filter 0.2s ease !important;
    }
    .nav-escena-4:hover {
      background-color: rgba(200, 200, 200, 0.5) !important;
      filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.9)) !important;
      backdrop-filter: brightness(1.2) contrast(1.1) !important;
    }

    #etiqueta-visor-render {
      position: absolute;
      bottom: 40px;
      right: 40px;
      top: auto;
      left: auto;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 16px 32px;
      border-radius: 8px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 2;
      border-right: 4px solid #ffffff;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* ── Círculo verde Escena 2 ── */
    .area-circulo-edificios-2 {
      position: absolute;
      top: 7.83%;
      left: 14.82%;
      width: 66.22%;
      height: 83.38%;
      border-radius: 50%;
    }

    .btn-catchall-edificios-2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .btn-catchall-edificio-planta {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .bloqueo-regreso-interior {
      pointer-events: auto;
    }

    .herramienta-coordenadas-exterior {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 55;
      cursor: crosshair;
      pointer-events: auto;
    }
    .camara-render {
      display: none;
      position: absolute;
      width: 64px;
      height: 64px;
      cursor: pointer;
      z-index: 60;
      transition: all 0.2s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
    }
    .camara-exterior,
    .camara-exterior-edificios,
    .camara-exterior-edificio1,
    .camara-exterior-edificio2,
    .camara-exterior-edificio3 {
      display: none;
      z-index: 60;
    }
    /* Vestíbulo Ed.3: iconos a mitad de tamaño (planta con zoom ×2) */
    .camara-render[id^="camara-vestibulo3-"] {
      width: 32px;
      height: 32px;
    }
    .camara-render[id^="camara-vestibulo1-"] {
      width: 32px;
      height: 32px;
    }
    .camara-render:hover { transform: scale(1.2); }

    .camara-activa {
      filter: drop-shadow(0 0 15px #00ffcc) brightness(1.5);
      transform: scale(1.3);
      z-index: 65;
    }

    /* Etiquetas de espacio en plantas — ocultas en escritorio */
    .mapa-interactivo > .etiqueta-zona-movil {
      display: none;
    }

    .mapa-interactivo.mapa-dual > #mapa-principal,
    .mapa-interactivo.mapa-dual > #mapa-secundario {
      max-height: calc(44vh - 28px);
    }

    /* Minimapa: solo visible con render abierto */
    body.visor-render-abierto .map-container {
      display: none;
    }

    body.visor-render-abierto .map-container.modo-minimapa {
      display: block;
      position: fixed !important;
      bottom: 20px;
      left: 20px;
      width: 300px !important;
      height: auto;
      z-index: 100;
      border: 3px solid rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      background: #1a1a1a;
      pointer-events: auto;
    }

    #visor-pantalla-completa {
      z-index: 50;
    }

    /* Botón pantalla completa */
    #btn-pantalla-completa {
      position: fixed;
      bottom: 78px;
      right: 20px;
      z-index: 360;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(12, 12, 12, 0.55);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease, opacity 0.3s ease;
    }

    #btn-pantalla-completa:hover:not(:disabled) {
      color: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.38);
      background: rgba(20, 20, 20, 0.72);
    }

    #btn-pantalla-completa:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.4);
      outline-offset: 2px;
    }

    #btn-pantalla-completa.activado {
      color: rgba(255, 255, 255, 0.35);
      border-color: rgba(255, 255, 255, 0.1);
      cursor: default;
    }

    body.carga-inicial-bloqueada #btn-pantalla-completa {
      display: none;
    }

    /* Invitación en splash (visible en ambos durante la precarga) */
    #btn-pantalla-completa-splash {
      margin-top: 28px;
      padding: 12px 26px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: rgba(255, 255, 255, 0.82);
      font-family: inherit;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 1.2px;
      line-height: 1.5;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.35s ease, color 0.35s ease, background 0.35s ease;
      max-width: min(92vw, 360px);
      text-align: center;
    }

    #btn-pantalla-completa-splash:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.5);
      color: #ffffff;
      background: rgba(255, 255, 255, 0.04);
    }

    #btn-pantalla-completa-splash:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.45);
      outline-offset: 3px;
    }

    #btn-pantalla-completa-splash.activado {
      border-color: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.48);
      cursor: default;
      background: transparent;
    }

    body.carga-inicial-bloqueada {
      overflow: hidden;
    }

    body.carga-inicial-bloqueada .map-container,
    body.carga-inicial-bloqueada #contenedor-encabezado,
    body.carga-inicial-bloqueada #panel-info {
      pointer-events: none;
    }

    /* Splash Screen Inicial */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0a0a0a;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
      pointer-events: all;
    }

    #splash-progreso {
      color: rgba(255, 255, 255, 0.45);
      margin-top: 12px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .loader-arquitectonico {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: girar 1s linear infinite;
    }
    @keyframes girar {
      to { transform: rotate(360deg); }
    }

    /* Spinner del Render */
    .spinner-circulo {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: girar 1s linear infinite;
    }

    /* Pantallas táctiles: sin hovers fantasma */
    @media (hover: none) {
      .zona-interactiva:hover,
      .nav-escena-4:hover,
      .camara-render:hover {
        background-color: transparent !important;
        backdrop-filter: none !important;
        transform: none !important;
        filter: none !important;
      }
    }

    /* Móvil: cámaras y botones escalan con la imagen (misma UI que laptop) */
    @media only screen and (max-width: 900px) {
      .camara-render,
      .camara-exterior,
      .camara-exterior-edificios,
      .camara-exterior-edificio1,
      .camara-exterior-edificio2,
      .camara-exterior-edificio3 {
        width: 5.33% !important;
        height: auto !important;
        aspect-ratio: 1;
        min-width: 28px;
        max-width: 64px;
      }

      .camara-render[id^="camara-vestibulo3-"],
      .camara-render[id^="camara-vestibulo1-"] {
        width: 2.67% !important;
        min-width: 16px;
        max-width: 32px;
      }

      .nav-escena-4 {
        font-size: clamp(9px, 2.2vw, 12px) !important;
      }

      .map-container.modo-minimapa {
        width: min(240px, 52vw) !important;
      }

      /* Nombres de espacios en plantas de edificios (sin hover en táctil) */
      .mapa-interactivo > .etiqueta-zona-movil {
        display: block;
        position: absolute;
        transform: translate(-50%, -50%);
        z-index: 38;
        pointer-events: none;
        padding: 2px 5px;
        background: rgba(48, 48, 48, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        color: rgba(245, 245, 245, 0.92);
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: clamp(5.6px, 1.36vw, 8px);
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        text-align: center;
        line-height: 1.2;
        max-width: min(24vw, 96px);
        word-wrap: break-word;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        transition: opacity 0.2s ease;
      }
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="loader-arquitectonico"></div>
    <h2 style="color: white; margin-top: 20px; font-weight: 300; letter-spacing: 3px;">CARGANDO PROYECTO...</h2>
    <p id="splash-progreso">Preparando recorrido virtual...</p>
    <button type="button" id="btn-pantalla-completa-splash">Ver en pantalla completa para mejor experiencia</button>
  </div>

  <button type="button" id="btn-pantalla-completa" aria-label="Pantalla completa" title="Pantalla completa">⛶</button>

  <div id="visor-pantalla-completa" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000;">
    <img id="imagen-render-activa" style="width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.4s ease;" src="" alt="Render 3D">

    <div id="spinner-render" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index: 1;">
      <div class="spinner-circulo"></div>
    </div>

    <!-- Nueva etiqueta de espacio -->
    <div id="etiqueta-visor-render">VISTA 3D</div>

    <button id="btn-cerrar-visor" onclick="navegarAtras()" style="position: absolute; top: 20px; right: 30px; font-size: 30px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 2;">✖</button>
  </div>

  <div id="overlay-oscuro">
    <div id="loader-escena"></div>
  </div>

  <div id="contenedor-encabezado">
    <button id="btn-regresar-planta"
            onclick="navegarAtras()"
            title="Regresar (Esc)">
      ⬅
    </button>

    <h1 id="titulo-principal">Exploración de Proyecto CICIP</h1>
  </div>

  <div class="map-container">
    <div id="mapa-interactivo" class="mapa-interactivo">
    <img id="mapa-principal" src="assets/Planta Conjunto.webp" alt="Planta Conjunto CICIP" />
    <img id="mapa-secundario" src="" alt="" style="display:none;" />

    <!-- Catch-all: cubre toda la imagen, z-index 5 -->
    <div class="botones-escena-1 btn-catchall-escena-1"
         onclick="irAEscenaExterior()"
         onmouseenter="mostrarInfo('Explorar Exterior')"
         onmouseleave="ocultarInfo()"></div>

    <!-- Círculo edificio circular 1, z-index 20, navega a escena 2 -->
    <div class="botones-escena-1 area-edificio-circular-1 zona-interactiva"
         onclick="irAEscena2()"
         onmouseenter="mostrarInfo('Zona de Edificios')"
         onmouseleave="ocultarInfo()"></div>

    <!-- Escena Exterior: tinte gris (solo visual) -->
    <div class="botones-escena-exterior btn-catchall-escena-1"
         style="display:none; z-index:10; pointer-events:none; border: 2px solid gray; background-color: rgba(128, 128, 128, 0.3);"></div>
    <!-- Escena Exterior: coordenadas (doble clic afuera del círculo = regresar) -->
    <div class="botones-escena-exterior herramienta-coordenadas-exterior"
         style="display:none;"
         onclick="clicExteriorConjunto(event)"></div>

    <!-- Escena 2: botón de regreso (catch-all), z-index 10 -->
    <div class="botones-escena-2"
         style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; cursor:pointer"
         onclick="volverAEscena1()"
         onmouseenter="mostrarInfo('Planta Conjunto')"
         onmouseleave="ocultarInfo()"></div>

    <!-- Escena 2: círculo verde — entrar a exploración exterior -->
    <div class="botones-escena-2 area-circulo-edificios-2 zona-interactiva"
         style="display:none; position:absolute; z-index:20; cursor:pointer"
         onclick="irAExteriorEdificios()"
         onmouseenter="mostrarInfo('Explorar Exterior Edificios')"
         onmouseleave="ocultarInfo()"></div>

    <!-- Escena 2: tinte gris exterior (solo visual) -->

  <script>
    /* ══ Candado herramientas de desarrollo (true = habilitado) ══ */
    window.HERRAMIENTAS_DEV = {
      editorPoligonos: false,
      coordenadasPorClic: false
    };

    function herramientasCoordsActivas() {
      return window.HERRAMIENTAS_DEV.coordenadasPorClic === true;
    }

    function editorPoligonosActivo() {
      return window.HERRAMIENTAS_DEV.editorPoligonos === true;
    }

    function aplicarCandadoHerramientasDev() {
      document.body.classList.toggle('sin-herramienta-coords', !herramientasCoordsActivas());
      var btnEd = document.getElementById('btn-editor');
      if (btnEd) {
        if (editorPoligonosActivo()) {
          btnEd.textContent = '✏️ Editor';
          btnEd.title = 'Editor de polígonos (tecla E)';
          btnEd.classList.remove('bloqueado-dev');
        } else {
          btnEd.textContent = '🔒 Editor';
          btnEd.title = 'Bloqueado. En index.html: HERRAMIENTAS_DEV.editorPoligonos = true';
          btnEd.classList.add('bloqueado-dev');
        }
      }
    }

    /* ── Herramienta de coordenadas ── */
    const mapImg           = document.getElementById('mapa-principal');
    const mapContainer     = document.querySelector('.map-container');
    const mapaInteractivo  = document.getElementById('mapa-interactivo');
    const overlay      = document.getElementById('overlay-oscuro');
    const loaderEscena = document.getElementById('loader-escena');
    const mapaSecundario = document.getElementById('mapa-secundario');

    const IMAGEN_INICIAL = 'assets/Planta Conjunto.webp';
    const PLANTA_EDIFICIOS = 'assets/planta-edificios.webp';
    var imagenEscenaActual = IMAGEN_INICIAL;
    var cacheImagenes = {};
    var promesasEnVuelo = {};
    var generacionCarga = 0;
    var colaVecinosPendiente = [];
    var MAX_CARGAS_PARALELAS = 2;

    var CARGA_SPLASH_TIMEOUT_MS = 6000;
    var cargaInicialActiva = true;

    var MAPA_EDIFICIO_ZONA = {
      'assets/edificio1.webp': 'zonas-edificio-1',
      'assets/edificio2.webp': 'zonas-edificio-2',
      'assets/edificio3.webp': 'zonas-edificio-3'
    };

    var VECINOS_MAPA = {
      'assets/Planta Conjunto.webp': [PLANTA_EDIFICIOS],
      'assets/planta-edificios.webp': [
        IMAGEN_INICIAL,
        'assets/edificio1.webp',
        'assets/edificio2.webp',
        'assets/edificio3.webp'
      ],
      'assets/edificio1.webp': [PLANTA_EDIFICIOS],
      'assets/edificio2.webp': [PLANTA_EDIFICIOS],
      'assets/edificio3.webp': [PLANTA_EDIFICIOS]
    };

    function invalidarCargasPendientes() {
      generacionCarga += 1;
      colaVecinosPendiente = [];
    }

    function contarCargasActivas() {
      return Object.keys(promesasEnVuelo).length;
    }

    function precargarImagen(src, generacion) {
      if (!src) return Promise.resolve(null);
      if (cacheImagenes[src]) return Promise.resolve(cacheImagenes[src]);

      var gen = generacion !== undefined ? generacion : generacionCarga;
      if (promesasEnVuelo[src] && promesasEnVuelo[src].gen === gen) {
        return promesasEnVuelo[src].promise;
      }

      var promise = new Promise(function (resolve) {
        var img = new Image();
        function finalizar(resultado) {
          delete promesasEnVuelo[src];
          if (gen !== generacionCarga) {
            resolve(null);
            return;
          }
          if (resultado) cacheImagenes[src] = resultado;
          resolve(resultado);
        }
        img.onload = function () { finalizar(img); };
        img.onerror = function () { finalizar(null); };
        img.src = src;
      });

      promesasEnVuelo[src] = { gen: gen, promise: promise };
      return promise;
    }

    function esperarImagenElemento(img) {
      if (!img || !img.src) return Promise.resolve();
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(function (resolve) {
        function onListo() {
          img.removeEventListener('load', onListo);
          img.removeEventListener('error', onListo);
          resolve();
        }
        img.addEventListener('load', onListo);
        img.addEventListener('error', onListo);
      });
    }

    function activarCortinaCarga() {
      ocultarEtiquetasMovilEdificios();
      overlay.style.opacity = '1';
      loaderEscena.style.display = 'block';
    }

    function retirarCortinaCarga(delay) {
      loaderEscena.style.display = 'none';
      setTimeout(function () {
        overlay.style.opacity = '0';
      }, delay || 0);
    }

    function asignarImagenPrincipal(src) {
      invalidarCargasPendientes();
      var gen = generacionCarga;
      return precargarImagen(src, gen).then(function () {
        if (gen !== generacionCarga) return Promise.resolve();
        mapImg.src = src;
        imagenEscenaActual = src;
        return esperarImagenElemento(mapImg).then(function () {
          ajustarMapaInteractivo();
        });
      });
    }

    function asignarImagenSecundaria(src) {
      if (!src) {
        mapaSecundario.style.display = 'none';
        mapaSecundario.src = '';
        mapaInteractivo.classList.remove('mapa-dual');
        ajustarMapaInteractivo();
        return Promise.resolve();
      }
      var gen = generacionCarga;
      return precargarImagen(src, gen).then(function () {
        if (gen !== generacionCarga) return Promise.resolve();
        mapaSecundario.src = src;
        mapaSecundario.style.display = 'block';
        mapaInteractivo.classList.add('mapa-dual');
        return esperarImagenElemento(mapaSecundario).then(function () {
          ajustarMapaInteractivo();
        });
      });
    }

    function ajustarMapaInteractivo() {
      if (!mapaInteractivo) return;
      mapaInteractivo.style.width = '';
      mapaInteractivo.style.height = '';
    }

    function extraerRutasOnclick(onclick) {
      if (!onclick) return [];
      return (onclick.match(/assets\/[^'"]+\.webp/g) || []).filter(function (r, i, a) {
        return a.indexOf(r) === i;
      });
    }

    function rutasPrimerClicDesdeOnclick(onclick) {
      var rutas = extraerRutasOnclick(onclick);
      return rutas.length ? [rutas[0]] : [];
    }

    function obtenerVecinosUnClic(rutaActual, opts) {
      opts = opts || {};
      var vecinos = (VECINOS_MAPA[rutaActual] || []).slice();
      var clase = opts.claseZonas || MAPA_EDIFICIO_ZONA[rutaActual];

      if (clase) {
        document.querySelectorAll('.botones-escena-3.' + clase + '[onclick*="irAEscena4"]').forEach(function (el) {
          vecinos = vecinos.concat(rutasPrimerClicDesdeOnclick(el.getAttribute('onclick')));
        });
      }

      if (opts.navIds) {
        opts.navIds.trim().split(/\s+/).forEach(function (id) {
          var el = document.getElementById(id);
          if (el && el.classList.contains('nav-escena-4')) {
            vecinos = vecinos.concat(rutasPrimerClicDesdeOnclick(el.getAttribute('onclick')));
          }
        });
      }

      if (opts.extra) vecinos = vecinos.concat(opts.extra);

      if (typeof e3Imagen !== 'undefined' && e3Imagen && rutaActual !== e3Imagen && !MAPA_EDIFICIO_ZONA[rutaActual]) {
        vecinos.push(e3Imagen);
      }

      if (opts.selectorCamaras) {
        document.querySelectorAll(opts.selectorCamaras).forEach(function (el) {
          if (el.style.display === 'none') return;
          vecinos = vecinos.concat(rutasPrimerClicDesdeOnclick(el.getAttribute('onclick')));
        });
      }

      return rutasUnicas(vecinos.filter(function (r) {
        return r && r !== rutaActual;
      }));
    }

    function procesarColaVecinos(vecinos, generacion) {
      colaVecinosPendiente = vecinos.slice();
      var indice = 0;

      function despachar() {
        if (generacion !== generacionCarga) return;
        while (indice < colaVecinosPendiente.length && contarCargasActivas() < MAX_CARGAS_PARALELAS) {
          var src = colaVecinosPendiente[indice++];
          if (cacheImagenes[src]) continue;
          precargarImagen(src, generacion).then(despachar);
        }
      }

      despachar();
    }

    function activarCargaReactiva(rutaActual, opts) {
      opts = opts || {};
      invalidarCargasPendientes();
      var gen = generacionCarga;
      var vecinos = obtenerVecinosUnClic(rutaActual, opts);

      precargarImagen(rutaActual, gen).then(function () {
        if (gen !== generacionCarga) return;
        procesarColaVecinos(vecinos, gen);
      });
    }

    var splashOcultado = false;

    function rutasUnicas(lista) {
      return (lista || []).filter(function (r, i, a) {
        return r && a.indexOf(r) === i;
      });
    }

    function actualizarTextoSplash(texto) {
      var el = document.getElementById('splash-progreso');
      if (el) el.textContent = texto;
    }

    function iniciarContadorSplash(segundos) {
      var restante = segundos;
      actualizarTextoSplash('Precargando recorrido... ' + restante + 's');
      var intervalo = setInterval(function () {
        restante -= 1;
        if (restante > 0) {
          actualizarTextoSplash('Precargando recorrido... ' + restante + 's');
        } else {
          clearInterval(intervalo);
        }
      }, 1000);
    }

    function ocultarSplash() {
      if (splashOcultado) return;
      splashOcultado = true;
      var splash = document.getElementById('splash-screen');
      splash.style.opacity = '0';
      splash.style.visibility = 'hidden';
      splash.style.pointerEvents = 'none';
    }

    function solicitarPantallaCompleta() {
      var root = document.documentElement;
      var request = root.requestFullscreen ||
        root.webkitRequestFullscreen ||
        root.mozRequestFullScreen ||
        root.msRequestFullscreen;
      if (!request) {
        return Promise.reject(new Error('Fullscreen no disponible'));
      }
      return Promise.resolve(request.call(root));
    }

    function marcarBotonPantallaCompletaActivado(btn) {
      if (!btn || btn.classList.contains('activado')) return;
      if (btn.id === 'btn-pantalla-completa-splash') {
        btn.textContent = 'Modo inmersivo activado';
        btn.disabled = true;
      } else {
        btn.title = 'Modo inmersivo activado';
        btn.setAttribute('aria-label', 'Modo inmersivo activado');
      }
      btn.classList.add('activado');
    }

    function enlazarBotonPantallaCompleta(btn) {
      if (!btn || btn.dataset.configurado === '1') return;
      btn.dataset.configurado = '1';
      btn.addEventListener('click', function () {
        if (btn.classList.contains('activado')) return;
        marcarBotonPantallaCompletaActivado(btn);
        var global = document.getElementById('btn-pantalla-completa');
        if (global && global !== btn) marcarBotonPantallaCompletaActivado(global);
        var splash = document.getElementById('btn-pantalla-completa-splash');
        if (splash && splash !== btn) marcarBotonPantallaCompletaActivado(splash);
        solicitarPantallaCompleta().catch(function () {});
      });
    }

    function configurarBotonesPantallaCompleta() {
      enlazarBotonPantallaCompleta(document.getElementById('btn-pantalla-completa-splash'));
      enlazarBotonPantallaCompleta(document.getElementById('btn-pantalla-completa'));
    }

    function liberarInterfazInicial() {
      if (!cargaInicialActiva) return;
      cargaInicialActiva = false;
      document.body.classList.remove('carga-inicial-bloqueada');
      ocultarSplash();
      ajustarMapaInteractivo();
    }

    function iniciarCargaInicial() {
      configurarBotonesPantallaCompleta();
      document.body.classList.add('carga-inicial-bloqueada');
      iniciarContadorSplash(CARGA_SPLASH_TIMEOUT_MS / 1000);
      activarCargaReactiva(IMAGEN_INICIAL);
      setTimeout(liberarInterfazInicial, CARGA_SPLASH_TIMEOUT_MS);
    }

    var accionRegresoPlanta = null;

    function mostrarBtnRegresarPlanta(fn) {
      accionRegresoPlanta = fn;
      document.getElementById('btn-regresar-planta').style.display = 'block';
    }

    function ocultarBtnRegresarPlanta() {
      accionRegresoPlanta = null;
      document.getElementById('btn-regresar-planta').style.display = 'none';
    }

    function ejecutarRegresoPlanta() {
      ocultarInfo();
      apagarTodasLasCamaras();
      if (typeof accionRegresoPlanta === 'function') {
        accionRegresoPlanta();
        return;
      }
      if (imagenEscenaActual !== IMAGEN_INICIAL) {
        volverAEscena1();
      }
    }

    function navegarAtras() {
      var visor = document.getElementById('visor-pantalla-completa');
      if (visor && visor.style.display === 'block') {
        cerrarRender();
        return;
      }
      ejecutarRegresoPlanta();
    }

    /* Zoom de planta (vestíbulo sobre la misma imagen del edificio) */
    function getZoomPlanta(rutaImagen, titulo) {
      if (rutaImagen === 'assets/edificio3.webp' && titulo === 'Vestíbulo')
        return { origenX: '42%', origenY: '55%', escala: 2 };
      if (rutaImagen === 'assets/edificio1.webp' && titulo === 'Vestíbulo/Pasillos')
        return { origenX: '43%', origenY: '49%', escala: 2 };
      return null;
    }

    function resetearZoomPlanta() {
      mapaInteractivo.style.transition = '';
      mapaInteractivo.style.transformOrigin = '';
      mapaInteractivo.style.transform = '';
    }

    function aplicarZoomPlanta(origenX, origenY, escala, animar) {
      mapaInteractivo.style.transformOrigin = origenX + ' ' + origenY;
      if (animar) {
        mapaInteractivo.style.transition = 'transform 2.2s ease-out';
        mapaInteractivo.style.transform = 'scale(1)';
        void mapaInteractivo.offsetWidth;
        mapaInteractivo.style.transform = 'scale(' + escala + ')';
      } else {
        mapaInteractivo.style.transition = '';
        mapaInteractivo.style.transform = 'scale(' + escala + ')';
      }
    }

    function getMapaReferenciaRect() {
      return mapaInteractivo.getBoundingClientRect();
    }

    mapImg.addEventListener('click', function (e) {
      if (!herramientasCoordsActivas()) return;
      const rect = getMapaReferenciaRect();
      const left = ((e.clientX - rect.left) / rect.width  * 100).toFixed(2);
      const top  = ((e.clientY - rect.top)  / rect.height * 100).toFixed(2);
      alert('Coordenadas del clic:\n\nleft: ' + left + '%\ntop:  ' + top + '%');
    });

    /* ── Herramienta de coordenadas reutilizable ── */
    function mostrarCoordenadas(e) {
      if (!herramientasCoordsActivas()) return;
      const rect = getMapaReferenciaRect();
      const left = ((e.clientX - rect.left) / rect.width  * 100).toFixed(2);
      const top  = ((e.clientY - rect.top)  / rect.height * 100).toFixed(2);
      alert('Coordenadas del clic:\n\nleft: ' + left + '%\ntop:  ' + top + '%');
    }

    function puntoEnElipse(e, cx, cy, rx, ry) {
      const rect = getMapaReferenciaRect();
      const left = (e.clientX - rect.left) / rect.width * 100;
      const top  = (e.clientY - rect.top)  / rect.height * 100;
      const dx = (left - cx) / rx;
      const dy = (top  - cy) / ry;
      return dx * dx + dy * dy <= 1;
    }

          volverAInicio();

    function nombreZonaEdificio(zona) {

      var coincidencia = enter.match(/mostrarInfo\('([^']+)'\)/);
      return coincidencia ? coincidencia[1] : '';
    }

    function parsePuntosPoligono(texto) {
      return texto.split(',').map(function (segmento) {
        var partes = segmento.trim().split(/\s+/);
        return {
          x: parseFloat(partes[0]),
          y: parseFloat(partes[1])
        };
      }).filter(function (p) {
        return !isNaN(p.x) && !isNaN(p.y);
      });
    }

    function centroPoligono(puntos) {
      if (!puntos.length) return { x: 50, y: 50 };
      if (puntos.length === 1) return puntos[0];
      if (puntos.length === 2) {
        return {
          x: (puntos[0].x + puntos[1].x) / 2,
          y: (puntos[0].y + puntos[1].y) / 2
        };
      }

      var area = 0;
      var cx = 0;
      var cy = 0;
      for (var i = 0; i < puntos.length; i++) {
        var j = (i + 1) % puntos.length;
        var cross = puntos[i].x * puntos[j].y - puntos[j].x * puntos[i].y;
        area += cross;
        cx += (puntos[i].x + puntos[j].x) * cross;
        cy += (puntos[i].y + puntos[j].y) * cross;
      }
      area *= 0.5;
      if (Math.abs(area) < 0.0001) {
        var sumX = 0;
        var sumY = 0;
        puntos.forEach(function (p) {
          sumX += p.x;
          sumY += p.y;
        });
        return { x: sumX / puntos.length, y: sumY / puntos.length };
      }
      return { x: cx / (6 * area), y: cy / (6 * area) };
    }

    function centroZonaEdificio(zona) {
      var style = zona.getAttribute('style') || '';
      var ellipse = style.match(/clip-path:ellipse\([^)]+\s+at\s+([\d.]+)%\s+([\d.]+)%\)/i);
      if (ellipse) {
        return { x: parseFloat(ellipse[1]), y: parseFloat(ellipse[2]) };
      }
      var polygon = style.match(/clip-path:polygon\(([^)]+)\)/i);
      if (polygon) {
        return centroPoligono(parsePuntosPoligono(polygon[1]));
      }
      return { x: 50, y: 50 };
    }

    function claseEdificioZona(zona) {
      var coincidencia = zona.className.match(/zonas-edificio-[123]/);
      return coincidencia ? coincidencia[0] : '';
    }

    function instalarEtiquetasMovilEdificios() {
      mapaInteractivo.querySelectorAll('.etiqueta-zona-movil').forEach(function (el) {
        el.remove();
      });
      if (!esVistaMovil()) return;

      document.querySelectorAll('.botones-escena-3.zona-interactiva[class*="zonas-edificio-"]').forEach(function (zona) {
        var nombre = nombreZonaEdificio(zona);
        if (!nombre) return;
        var centro = centroZonaEdificio(zona);
        var etiqueta = document.createElement('span');
        etiqueta.className = 'etiqueta-zona-movil';
        etiqueta.dataset.edificio = claseEdificioZona(zona);
        etiqueta.textContent = nombre;
        etiqueta.style.left = centro.x + '%';
        etiqueta.style.top = centro.y + '%';
        mapaInteractivo.appendChild(etiqueta);
      });
      sincronizarVisibilidadEtiquetasMovil();
    }

        mapImg.classList.add('animacion-entrar');
        activarCargaReactiva(imagenEscenaActual);
        retirarCortinaCarga(350);

        esperarAnimacionImagen('zoom-entrar', function () {
          document.querySelectorAll('.botones-escena-1').forEach(function (btn) {
            btn.style.display = 'block';
          });
        });
      });
    }

    /* ── Estado de Escena 3 para poder regresar correctamente ── */
    let e3Imagen  = '';
    let e3Titulo  = '';
    let e3Zonas   = '';

    /* ── Salto lateral entre cuartos (sin volver al mapa) ── */
    /* Oculta todos los nav-escena-4 y flechas, luego muestra los IDs indicados */
    function mostrarNavs(ids) {
      document.querySelectorAll('.nav-escena-4, .flecha-salto-planta, .camara-render').forEach(function (el) {
        el.style.display = 'none';
      });
      if (ids) {
        ids.trim().split(/\s+/).forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.style.display = el.classList.contains('flecha-salto-planta') ? 'flex' : 'block';
        });
      }
    }

    function saltoLateral(rutaImagen, nuevoTitulo, flechaOcultar, flechaMostrar, rutaImagen2) {
      ocultarEtiquetasMovilEdificios();
      cerrarRender();
      ocultarInfo();
      apagarTodasLasCamaras();
      mostrarBtnRegresarPlanta(volverAEscena3);
      document.querySelectorAll('.nav-escena-4, .flecha-salto-planta').forEach(function (el) {
        el.style.display = 'none';
      });
      mapImg.style.transform = '';
      const zoomPlanta = getZoomPlanta(rutaImagen, nuevoTitulo);
      if (!zoomPlanta) resetearZoomPlanta();
      activarCortinaCarga();

      Promise.all([
        asignarImagenPrincipal(rutaImagen),
        asignarImagenSecundaria(rutaImagen2 || null)
      ]).then(function () {
        document.getElementById('titulo-principal').textContent = nuevoTitulo;
        mapImg.classList.remove('animacion-salir', 'animacion-entrar', 'animacion-salir-e3', 'animacion-entrar-e3', 'animacion-entrar-regreso-e3');
        void mapImg.offsetWidth;

        function activarNavsYCamaras() {
          mostrarNavs(flechaMostrar);
          mostrarBtnRegresarPlanta(volverAEscena3);
          activarCargaReactiva(imagenEscenaActual, {
            navIds: flechaMostrar,
            selectorCamaras: '.camara-render'
          });
        }

        if (zoomPlanta) {
          mapImg.style.transform = '';
          aplicarZoomPlanta(zoomPlanta.origenX, zoomPlanta.origenY, zoomPlanta.escala, true);
          retirarCortinaCarga(300);
          esperarTransicionContenedor(activarNavsYCamaras);
        } else {
          mapImg.classList.add('animacion-entrar-e3');
          retirarCortinaCarga(300);
          esperarAnimacionImagen('zoom-entrar-escena3', activarNavsYCamaras);
        }
      });
    }

    /* ── Ir a Escena 4 (espacio interior) ── */

    function irAEscena4(rutaImagen, nuevoTitulo, origenX, origenY, rutaImagen2, escalaFija, flechaMostrar) {
      ocultarEtiquetasMovilEdificios();
      ocultarInfo();
      apagarTodasLasCamaras();
      mostrarBtnRegresarPlanta(volverAEscena3);
      ocultarModoExteriorEdificio();
      document.querySelectorAll('.nav-escena-4, .flecha-salto-planta').forEach(function (el) {
        el.style.display = 'none';
      });

      document.getElementById('mapa-principal').style.transformOrigin = origenX + ' ' + origenY;

      // Ocultar zonas del edificio actual y catch-all de escena 3
      document.querySelectorAll('.botones-escena-3').forEach(function (btn) {
        btn.style.display = 'none';
      });

      // a) Arrancar zoom de salida
      mapImg.classList.remove('animacion-salir', 'animacion-entrar', 'animacion-salir-e3', 'animacion-entrar-e3', 'animacion-entrar-regreso-e3');
      void mapImg.offsetWidth;
      mapImg.classList.add('animacion-salir-e3');

      // b) Tras 1400 ms: cortina + esperar imagen(es) antes de cambiar
      setTimeout(function () {
        activarCortinaCarga();

        Promise.all([
          asignarImagenPrincipal(rutaImagen),
          asignarImagenSecundaria(rutaImagen2 || null)
        ]).then(function () {
          document.getElementById('titulo-principal').textContent = nuevoTitulo;
          mapImg.classList.remove('animacion-salir-e3');
          mapImg.style.transform = '';
          void mapImg.offsetWidth;

          function activarEscena4() {
            if (herramientasCoordsActivas()) {
              document.querySelectorAll('.botones-escena-4').forEach(function (btn) {
                btn.style.display = 'block';
              });
            }
            mostrarNavs(flechaMostrar || '');
            mostrarBtnRegresarPlanta(volverAEscena3);
            activarCargaReactiva(imagenEscenaActual, {
              navIds: flechaMostrar,
              selectorCamaras: '.camara-render'
            });
          }

          if (escalaFija) {
            resetearZoomPlanta();
            aplicarZoomPlanta(origenX, origenY, escalaFija, true);
            retirarCortinaCarga(400);
            esperarTransicionContenedor(activarEscena4);
          } else {
            resetearZoomPlanta();
            mapImg.classList.add('animacion-entrar-e3');
            retirarCortinaCarga(400);
            esperarAnimacionImagen('zoom-entrar-escena3', activarEscena4);
          }
        });
      }, 1400);
    }

    /* ── Volver a Escena 3 (planta del edificio) ── */
    function volverAEscena3() {
      ocultarEtiquetasMovilEdificios();
      ocultarInfo();
      apagarTodasLasCamaras();

      // Ocultar todas las flechas y polígonos de navegación lateral
      document.querySelectorAll('.nav-escena-4').forEach(function (f) {
        f.style.display = 'none';
      });

      // Resetear zoom de planta (vestíbulo) si estaba aplicado
      resetearZoomPlanta();
      mapImg.style.transform = '';

      // Ocultar imagen secundaria si estaba visible
      mapaSecundario.style.display = 'none';
      mapaSecundario.src = '';
      mapaInteractivo.classList.remove('mapa-dual');

      // Ocultar botones de escena 4
      document.querySelectorAll('.botones-escena-4').forEach(function (btn) {
        btn.style.display = 'none';
      });

      mapImg.style.transformOrigin = '50% 50%';
      activarCortinaCarga();

      asignarImagenPrincipal(e3Imagen).then(function () {
        document.getElementById('titulo-principal').textContent = e3Titulo;
        mapImg.classList.remove('animacion-salir', 'animacion-entrar', 'animacion-salir-e3', 'animacion-entrar-e3', 'animacion-entrar-regreso-e3');
        void mapImg.offsetWidth;
        mapImg.classList.add('animacion-entrar');
        activarCargaReactiva(imagenEscenaActual, { claseZonas: e3Zonas });
        retirarCortinaCarga(350);

        esperarAnimacionImagen('zoom-entrar', function () {
          mostrarBotonesEscena3();
          mostrarBtnRegresarPlanta(volverAEscena2);
        });
      });
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        navegarAtras();
      }
    });

    window.addEventListener('resize', function () {
      ajustarMapaInteractivo();
      instalarEtiquetasMovilEdificios();
    });
    window.addEventListener('orientationchange', function () {
      ajustarMapaInteractivo();
      instalarEtiquetasMovilEdificios();
    });
    mapImg.addEventListener('load', function () {
      ajustarMapaInteractivo();
      instalarEtiquetasMovilEdificios();
    });
    instalarEtiquetasMovilEdificios();
  </script>

  <!-- ══════════════════════════════════════════
       MODO EDITOR DE POLÍGONOS (herramienta dev)
       ══════════════════════════════════════════ -->

  <!-- Canvas de dibujo (cubre toda la ventana) -->
  <canvas id="editor-canvas" style="
    display:none;
    position:fixed;
    top:0; left:0;
    z-index:999;
    pointer-events:none;
  "></canvas>

  <!-- Panel flotante de estado -->
  <div id="editor-panel" style="
    display:none;
    position:fixed;
    top:12px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.92);
    color:#fff;
    padding:10px 18px;
    border-radius:8px;
    font:bold 13px monospace;
    z-index:1000;
    border:1px solid #444;
    min-width:340px;
    text-align:center;
    letter-spacing:0.03em;
  ">
    🟢 MODO EDITOR — <span id="editor-contador">0 puntos</span><br>
    <span style="font-weight:normal; font-size:11px;">
      Clic izq: punto &nbsp;|&nbsp; C / N: nuevo &nbsp;|&nbsp; E: salir
    </span><br>
    <button onclick="cerrarPoligono()"
      style="margin-top:6px; background:#333; color:#0ff; border:1px solid #0ff;
             border-radius:4px; padding:4px 14px; font:bold 11px monospace; cursor:pointer;">
      ✔ Cerrar polígono
    </button>
    &nbsp;
    <button onclick="limpiarEditor()"
      style="margin-top:6px; background:#333; color:#f88; border:1px solid #f88;
             border-radius:4px; padding:4px 14px; font:bold 11px monospace; cursor:pointer;">
      ✖ Limpiar
    </button>
    <div id="editor-resultado" style="display:none; margin-top:8px;">
      <input id="editor-output" type="text" readonly
        style="width:100%; background:#111; color:#0ff; border:1px solid #0ff;
               border-radius:4px; padding:5px 8px; font:12px monospace;
               cursor:text; box-sizing:border-box;"
        onclick="this.select()">
      <button onclick="copiarPoligono()"
        style="margin-top:6px; width:100%; background:#0ff; color:#000;
               border:none; border-radius:4px; padding:5px 0; font:bold 12px monospace;
               cursor:pointer;">
        📋 Copiar al portapapeles
      </button>
      <button onclick="nuevoPoligono()"
        style="margin-top:6px; width:100%; background:#333; color:#ff0; border:1px solid #ff0;
               border-radius:4px; padding:5px 0; font:bold 12px monospace; cursor:pointer;">
        ↺ Nuevo polígono
      </button>
      <span id="editor-copiado" style="display:none; color:#0f0; font-size:11px; margin-top:4px; display:block;">&#x200B;</span>
    </div>
  </div>

  <!-- Botón de toggle (esquina superior izquierda) -->
  <button id="btn-editor" onclick="toggleEditor()" style="
    position:fixed;
    top:12px; left:12px;
    background:rgba(30,30,30,0.9);
    color:#aaa;
    border:1px solid #555;
    border-radius:6px;
    padding:6px 12px;
    font:12px monospace;
    cursor:pointer;
    z-index:1000;
  ">🔒 Editor</button>

  <script>
    /* ══ MODO EDITOR DE POLÍGONOS ══ */
    let editorActivo = false;
    let puntosEditor = [];
    let poligonoCerrado = false;

    const editorCanvas  = document.getElementById('editor-canvas');
    const editorPanel   = document.getElementById('editor-panel');
    const editorContador = document.getElementById('editor-contador');
    const btnEditor     = document.getElementById('btn-editor');
    const mapContainer  = document.querySelector('.map-container');
    let ctx;

    function toggleEditor() {
      if (typeof editorPoligonosActivo === 'function' && !editorPoligonosActivo()) {
        console.log('%c🔒 Editor bloqueado — HERRAMIENTAS_DEV.editorPoligonos = true', 'color:#888');
        return;
      }
      editorActivo = !editorActivo;

      if (editorActivo) {
        // Canvas cubre toda la ventana
        editorCanvas.width  = window.innerWidth;
        editorCanvas.height = window.innerHeight;
        editorCanvas.style.width  = window.innerWidth  + 'px';
        editorCanvas.style.height = window.innerHeight + 'px';
        editorCanvas.style.display = 'block';
        editorCanvas.style.pointerEvents = 'auto';
        editorCanvas.style.cursor = 'crosshair';
        ctx = editorCanvas.getContext('2d');
        editorPanel.style.display = 'block';
        btnEditor.style.color = '#0f0';
        btnEditor.style.borderColor = '#0f0';
        editorCanvas.addEventListener('click',      onEditorClick);
        editorCanvas.addEventListener('dblclick',   onEditorDblClick);
        editorCanvas.addEventListener('contextmenu', onEditorCerrar);
        console.log('%c✏️  Modo Editor ACTIVO', 'color:lime;font-weight:bold');
      } else {
        editorCanvas.style.display = 'none';
        editorCanvas.style.pointerEvents = 'none';
        editorPanel.style.display = 'none';
        btnEditor.style.color = '#aaa';
        btnEditor.style.borderColor = '#555';
        editorCanvas.removeEventListener('click',      onEditorClick);
        editorCanvas.removeEventListener('dblclick',   onEditorDblClick);
        editorCanvas.removeEventListener('contextmenu', onEditorCerrar);
        limpiarEditor();
        console.log('%c✏️  Modo Editor DESACTIVADO', 'color:gray');
      }
    }

    /* Cuando hay 2 imágenes apiladas, los nav usan % del contenedor completo */
    function getEditorRefRect() {
      return mapaInteractivo.getBoundingClientRect();
    }

    function onEditorClick(e) {
      e.preventDefault();
      if (poligonoCerrado) nuevoPoligono();
      // Porcentajes relativos al contenedor (o imagen única si no hay segunda)
      const refRect = getEditorRefRect();
      const relX = e.clientX - refRect.left;
      const relY = e.clientY - refRect.top;
      const left = (relX / refRect.width  * 100).toFixed(2);
      const top  = (relY / refRect.height * 100).toFixed(2);
      // Posición en pantalla para dibujar (coordenadas del canvas full-window)
      puntosEditor.push({ px: e.clientX, py: e.clientY, left, top });
      editorContador.textContent = puntosEditor.length + ' punto' + (puntosEditor.length !== 1 ? 's' : '');
      dibujarEditor();
    }

    function mostrarResultadoEditor(resultado) {
      const divRes = document.getElementById('editor-resultado');
      const input  = document.getElementById('editor-output');
      const aviso  = document.getElementById('editor-copiado');
      input.value = resultado;
      divRes.style.display = 'block';
      aviso.textContent = '';
      setTimeout(function() { input.select(); }, 50);
    }

    function copiarPoligono() {
      const input = document.getElementById('editor-output');
      const aviso = document.getElementById('editor-copiado');
      input.select();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(input.value).then(function() {
          aviso.textContent = '✔ ¡Copiado!';
        }).catch(function() {
          aviso.textContent = 'Selecciona el texto manualmente';
        });
      } else {
        try {
          document.execCommand('copy');
          aviso.textContent = '✔ ¡Copiado!';
        } catch(err) {
          aviso.textContent = 'Selecciona el texto manualmente';
        }
      }
    }

    function onEditorDblClick(e) {
      e.preventDefault();
      cerrarPoligono();
    }

    function onEditorCerrar(e) {
      e.preventDefault();
      cerrarPoligono();
    }

    function cerrarPoligono() {
      if (puntosEditor.length < 3) {
        document.getElementById('editor-contador').textContent = '⚠ Necesitas al menos 3 puntos';
        return;
      }
      const poligono = puntosEditor
        .map(function(p) { return p.left + '% ' + p.top + '%'; })
        .join(', ');
      const resultado = 'clip-path: polygon(' + poligono + ');';
      poligonoCerrado = true;
      mostrarResultadoEditor(resultado);
    }

    function nuevoPoligono() {
      puntosEditor = [];
      poligonoCerrado = false;
      if (ctx) ctx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
      if (editorContador) editorContador.textContent = '0 puntos';
      const divRes = document.getElementById('editor-resultado');
      const input  = document.getElementById('editor-output');
      const aviso  = document.getElementById('editor-copiado');
      if (divRes) divRes.style.display = 'none';
      if (input) input.value = '';
      if (aviso) aviso.textContent = '';
    }

    function limpiarEditor() {
      nuevoPoligono();
    }

    function dibujarEditor() {
      ctx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);

      // Relleno del polígono en construcción
      if (puntosEditor.length >= 3) {
        ctx.beginPath();
        ctx.moveTo(puntosEditor[0].px, puntosEditor[0].py);
        puntosEditor.forEach(function(p) { ctx.lineTo(p.px, p.py); });
        ctx.closePath();
        ctx.fillStyle = 'rgba(255,255,0,0.15)';
        ctx.fill();
      }

      // Líneas de conexión
      if (puntosEditor.length >= 2) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,80,80,0.9)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 3]);
        ctx.moveTo(puntosEditor[0].px, puntosEditor[0].py);
        puntosEditor.forEach(function(p) { ctx.lineTo(p.px, p.py); });
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Puntos y etiquetas
      puntosEditor.forEach(function(p, i) {
        ctx.beginPath();
        ctx.fillStyle = '#ff4444';
        ctx.arc(p.px, p.py, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px monospace';
        ctx.fillText(i + 1, p.px + 8, p.py - 4);
      });
    }

    // Tecla E: toggle editor | C / N: nuevo polígono
    document.addEventListener('keydown', function(e) {
      if (e.key === 'e' || e.key === 'E') {
        if (typeof editorPoligonosActivo === 'function' && !editorPoligonosActivo()) return;
        toggleEditor();
      }
      if (editorActivo && (e.key === 'c' || e.key === 'C' || e.key === 'n' || e.key === 'N')) {
        nuevoPoligono();
      }
    });

    // Re-ajustar canvas si la ventana cambia de tamaño
    window.addEventListener('resize', function() {
      if (!editorActivo) return;
      editorCanvas.width  = window.innerWidth;
      editorCanvas.height = window.innerHeight;
      editorCanvas.style.width  = window.innerWidth  + 'px';
      editorCanvas.style.height = window.innerHeight + 'px';
      dibujarEditor();
    });

    aplicarCandadoHerramientasDev();
  </script>

  <script src="navs.js"></script>
  <script src="cameras.js"></script>
  <script>
    iniciarCargaInicial();
  </script>
</body>
